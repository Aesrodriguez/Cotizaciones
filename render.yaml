services:
  # Backend API
  - type: web
    name: cotizaciones-api
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run migrate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cotizaciones-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        fromService:
          name: cotizaciones-web
          type: web
          property: host

  # Frontend
  - type: web
    name: cotizaciones-web
    env: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: cotizaciones-api
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: cotizaciones-db
    databaseName: cotizaciones_db
    region: oregon
    plan: free
