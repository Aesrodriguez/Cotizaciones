services:
  # Backend API — Python FastAPI con Docker
  - type: web
    name: cotizaciones-api
    env: docker
    region: oregon
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cotizaciones-db
          property: internalConnectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 15
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: CORS_ORIGINS
        value: '["https://cotizaciones-web.onrender.com"]'
      - key: LOG_LEVEL
        value: INFO

  # Frontend — React + Vite (sitio estático)
  - type: web
    name: cotizaciones-web
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://cotizaciones-api.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: cotizaciones-db
    databaseName: cotizaciones_db
    plan: free
    region: oregon
