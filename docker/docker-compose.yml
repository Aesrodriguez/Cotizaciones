version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: cotizaciones-postgres-dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cotizaciones}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-cotizaciones_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cotizaciones} -d ${POSTGRES_DB:-cotizaciones_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cotizaciones-network
    restart: unless-stopped

  # Backend Service (Python/FastAPI)
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: cotizaciones-backend-dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cotizaciones}:${POSTGRES_PASSWORD:-dev_password}@postgres:5432/${POSTGRES_DB:-cotizaciones_db}
      ENVIRONMENT: development
      DEBUG: "true"
      LOG_LEVEL: debug
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173"
    volumes:
      - ../backend:/app
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - cotizaciones-network
    restart: unless-stopped

  # Frontend Service (Node.js/Vite)
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: builder
    container_name: cotizaciones-frontend-dev
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
      NODE_ENV: development
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/dist
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - cotizaciones-network
    restart: unless-stopped

volumes:
  postgres_data_dev:
    driver: local

networks:
  cotizaciones-network:
    driver: bridge
